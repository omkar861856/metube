name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (not really needed but good practice)
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST || secrets.SERVER_IP || secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USER || secrets.SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
          script: |
            cd /root
            echo "📥 Pulling latest code..."
            git pull origin master
            echo "🐳 Rebuilding containers..."
            docker compose up -d --build
            echo "🧹 Cleaning old images..."
            docker image prune -f
            echo "✅ Deploy done"