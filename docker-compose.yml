services:
  metube:
    image: ghcr.io/${GITHUB_USERNAME:-yourusername}/metube:latest
    container_name: metube
    restart: unless-stopped
    volumes:
      - ./downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - metube

volumes:
  caddy_data:
  caddy_config:
