version: "3.9"

services:
  metube:
    build: .
    container_name: metube
    restart: unless-stopped

    volumes:
      - /root/volumes/metube/downloads:/downloads

    environment:
      - PUID=1000
      - PGID=1000

    networks:
      - traefik

    labels:
      - "traefik.enable=true"

      # 🌐 DOMAIN
      - "traefik.http.routers.metube.rule=Host(`metube.ecotron.co.in`)"

      # 🔐 HTTPS
      - "traefik.http.routers.metube.entrypoints=websecure"
      - "traefik.http.routers.metube.tls.certresolver=myresolver"

      # 🔁 HTTP → HTTPS
      - "traefik.http.routers.metube-http.rule=Host(`metube.ecotron.co.in`)"
      - "traefik.http.routers.metube-http.entrypoints=web"
      - "traefik.http.routers.metube-http.middlewares=redirect-to-https"

      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      # 🔌 internal port
      - "traefik.http.services.metube.loadbalancer.server.port=8081"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true